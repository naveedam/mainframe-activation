<!DOCTYPE html>
<html>
<head>
<title>Mainframe AI Command Center</title>

<style>

body{
background:#020617;
color:white;
font-family:Arial;
text-align:center;
margin:0;
overflow:hidden;
}

/* HEADER */

h1{
font-size:60px;
color:#00eaff;
margin-top:40px;
letter-spacing:2px;
}

.subtitle{
opacity:.7;
margin-top:10px;
}

/* GRID */

.dashboard{
display:flex;
justify-content:center;
gap:60px;
margin-top:80px;
}

/* CARDS */

.card{
background:#0b132b;
padding:40px;
width:320px;
border-radius:16px;
box-shadow:0 0 40px rgba(0,234,255,0.25);
}

.label{
font-size:18px;
opacity:.7;
}

.value{
font-size:42px;
color:#00eaff;
margin-top:10px;
}

/* BUTTONS */

.actions{
margin-top:80px;
}

button{
padding:20px 50px;
font-size:22px;
margin:20px;
background:#00eaff;
border:none;
cursor:pointer;
border-radius:10px;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* ANIMATED BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at 20% 20%, rgba(0,234,255,0.1), transparent),
            radial-gradient(circle at 80% 80%, rgba(0,234,255,0.1), transparent);
z-index:-1;
animation: pulse 6s infinite alternate;
}

@keyframes pulse{
from{opacity:0.3;}
to{opacity:1;}
}

</style>
</head>

<body>

<div class="bg"></div>

<h1>MAINFRAME AI COMMAND CENTER</h1>
<p class="subtitle">The Invisible Engine of the World</p>

<div class="dashboard">

<div class="card">
<div class="label">Credit Card Transactions</div>
<div id="cc" class="value">0</div>
</div>

<div class="card">
<div class="label">ATM Withdrawals</div>
<div id="atm" class="value">0</div>
</div>

<div class="card">
<div class="label">Airline Bookings</div>
<div id="air" class="value">0</div>
</div>

</div>

<div class="actions">

<button onclick="location.href='modernize.html'">
Modernise Applications
</button>

<button onclick="location.href='operations.html'">
Simplify Operations
</button>

</div>

<script>

/* LIVE COUNTERS */

let cc = 2000000;
let atm = 800000;
let air = 400000;

function format(num){
return num.toLocaleString();
}

function update(){

cc += Math.floor(Math.random()*50);
atm += Math.floor(Math.random()*20);
air += Math.floor(Math.random()*10);

document.getElementById("cc").innerText = format(cc);
document.getElementById("atm").innerText = format(atm);
document.getElementById("air").innerText = format(air);

}

setInterval(update, 500);

update();

</script>

</body>
</html>
