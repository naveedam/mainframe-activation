<!DOCTYPE html>
<html>
<head>
<title>Mainframe Operations Challenge</title>

<style>
body{
background:#000814;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#00eaff;
margin-top:40px;
}

.alert{
background:#8b0000;
padding:30px;
width:500px;
margin:40px auto;
border-radius:10px;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
background:#00eaff;
border:none;
cursor:pointer;
border-radius:6px;
}

button:hover{
opacity:0.8;
}

.result{
font-size:24px;
margin-top:40px;
color:#00ff9c;
white-space:pre-line;
}

</style>
</head>

<body>

<button onclick="location.href='index.html'">⬅ Home</button>

<h1>Mainframe Operations Challenge</h1>

<div style="width:60%;margin:20px auto;background:#111;border-radius:5px;">
<div id="progress" style="height:10px;width:10%;background:#00eaff;border-radius:5px;"></div>
</div>

<div class="alert">
⚠ Batch Job Failure  
<br><br>
Job: PAYROLL-784
</div>

<h3>How should we resolve this?</h3>

<button onclick="slow()">Search logs manually</button>
<button onclick="slow()">Restart system</button>
<button onclick="ai()">Use watsonx Assistant</button>

<div id="result" class="result"></div>

<audio id="successSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>

let score = 0;

function slow(){
score -= 10;
document.getElementById("result").innerText =
"❌ Manual troubleshooting...\nScore: " + score;
}

function ai(){

document.getElementById("result").innerText = "🤖 AI analyzing system logs...";

setTimeout(()=>{

score += 50;

document.getElementById("progress").style.width = "100%";

document.getElementById("result").innerText =
"✅ AI Agent Resolved Issue!\nScore: " + score +
"\nRoot Cause: Disk allocation failure\nAuto-remediation applied\nMTTR reduced 90%";

document.getElementById("successSound").play();

},1500);

}

setTimeout(()=>{
location.href="index.html"
},30000)

</script>

</body>
</html>
