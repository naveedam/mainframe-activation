<!DOCTYPE html>
<html>
<head>
<title>Operations Challenge</title>

<style>
body{
background:#000814;
color:white;
font-family:Arial;
text-align:center;
}

.alert{
background:#8b0000;
padding:30px;
width:500px;
margin:40px auto;
}

button{
padding:15px 30px;
margin:10px;
font-size:18px;
background:#00eaff;
border:none;
cursor:pointer;
}

.result{
font-size:24px;
margin-top:40px;
color:#00ff9c;
}
</style>
</head>

<body>

<button onclick="location.href='index.html'">⬅ Home</button>

<h1>Mainframe Operations Challenge</h1>

<div class="alert">
⚠ Batch Job Failure  
Job: PAYROLL-784
</div>

<h3>How should we resolve this?</h3>

<button onclick="slow()">Search logs manually</button>
<button onclick="slow()">Restart system</button>
<button onclick="ai()">Use watsonx Assistant</button>

<div id="result" class="result"></div>

<script>

function slow(){
document.getElementById("result").innerText =
"❌ Manual troubleshooting may take hours...";
}

function ai(){
document.getElementById("result").innerText =
"✅ AI Agent detected root cause\nDisk allocation issue\nAuto-remediation applied\nMTTR reduced 90%";
}

setTimeout(()=>{
location.href="index.html"
},120000)

</script>

</body>
</html>
