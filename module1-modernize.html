<!DOCTYPE html>
<html>
<head>
<title>Modernize COBOL</title>

<style>

body{
background:#020a1f;
color:white;
font-family:monospace;
text-align:center;
}

h1{
color:#00eaff;
}

.code{
background:black;
padding:30px;
margin:40px auto;
width:600px;
text-align:left;
}

button{
padding:20px 40px;
font-size:20px;
background:#00eaff;
border:none;
cursor:pointer;
}

.result{
margin-top:40px;
font-size:24px;
color:#00ff9c;
}

</style>
</head>

<body>

<h1>Modernise COBOL Application</h1>

<div class="code" id="code">

IDENTIFICATION DIVISION.
PROGRAM-ID. PAYMENT.
PROCEDURE DIVISION.
DISPLAY "PROCESS PAYMENT".
STOP RUN.

</div>

<button onclick="modernize()">Use watsonx Code Assistant</button>

<div id="result" class="result"></div>

<script>

function modernize(){

document.getElementById("code").innerText=`

public class PaymentService {

 public void processPayment(){
   System.out.println("Processing Payment");
 }

}
`

document.getElementById("result").innerText=
"Modernization Complete ✔ Technical Debt Reduced"

}

</script>

</body>
</html>
